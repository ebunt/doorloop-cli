    endpoints:
      list:
        method: GET
        path: /communication-logs
        params:
          - name: filter_tenant
            in: query
            description: Filter by tenant ID
          - name: filter_lease
            in: query
            description: Filter by lease ID
          - name: filter_property
            in: query
            description: Filter by property ID
      get:
        method: GET
        path: /communication-logs/{id}
        params:
          - name: id
            in: path
            required: true
      create:
        method: POST
        path: /communication-logs
      update:
        method: PUT
        path: /communication-logs/{id}
        params:
          - name: id
            in: path
            required: true
      delete:
        method: DELETE
        path: /communication-logs/{id}
        params:
          - name: id
            in: path
            required: true

  reports:
