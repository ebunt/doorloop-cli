    endpoints:
      list:
        method: GET
        path: /reports
        params:
          - name: filter_property
            in: query
            description: Filter by property ID
          - name: filter_group
            in: query
            description: Filter by portfolio ID
          - name: filter_date_from
            in: query
            description: Report period from (YYYY-MM-DD)
          - name: filter_date_to
            in: query
            description: Report period to (YYYY-MM-DD)
