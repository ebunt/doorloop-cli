    endpoints:
      list:
        method: GET
        path: /files
        params:
          - name: filter_property
            in: query
            description: Filter by property ID
          - name: filter_lease
            in: query
            description: Filter by lease ID
      get:
        method: GET
        path: /files/{id}
        params:
          - name: id
            in: path
            required: true
      create:
        method: POST
        path: /files
      update:
        method: PUT
        path: /files/{id}
        params:
          - name: id
            in: path
            required: true
      delete:
        method: DELETE
        path: /files/{id}
        params:
          - name: id
            in: path
            required: true

  communication_logs:
